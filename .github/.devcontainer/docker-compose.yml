version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    volumes:
      - ../:/workspaces/nextjs-saas-starter-kit-lite:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    network_mode: host
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    privileged: true
